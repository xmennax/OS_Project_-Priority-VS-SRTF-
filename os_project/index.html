<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Scheduling Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>⚙️ CPU Scheduling Simulator</h1>
        <p>Priority Scheduling vs SRTF</p>
    </header>

    <div class="container">


        <section class="card" id="input-section">
            <h2>📥 Input Panel</h2>

            <div class="scenario-bar">
                <span class="scenario-label">Load Scenario:</span>
                <button class="scenario-btn" onclick="loadScenario('A')">📦 Scenario A<br><small>Basic Mixed</small></button>
                <button class="scenario-btn" onclick="loadScenario('B')">⚔️ Scenario B<br><small>Priority vs Burst</small></button>
                <button class="scenario-btn" onclick="loadScenario('C')">⏳ Scenario C<br><small>Starvation</small></button>
                <button class="scenario-btn scenario-btn--danger" onclick="loadScenario('D')">❌ Scenario D<br><small>Invalid Input</small></button>
            </div>

            <div class="input-row">
                <label>Number of Processes:</label>
                <input type="number" id="num-processes" min="1" max="20" value="3">
                <button onclick="generateTable()">Generate Table</button>
                <button id="reset-btn" onclick="resetInput()" style="display:none;">🔄 Reset</button>
            </div>


            <div id="process-table-wrapper" style="display:none;">
                <table id="input-table">
                    <thead>
                        <tr>
                            <th>PID</th>
                            <th>Arrival Time</th>
                            <th>Burst Time</th>
                            <th>Priority</th>
                        </tr>
                    </thead>
                    <tbody id="input-body"></tbody>
                </table>

                <div id="error-msg" class="error-msg"></div>

                <button class="run-btn" onclick="runSimulation()">
                    ▶ Run Simulation
                </button>
            </div>
        </section>


        <div id="results-section" style="display:none;">


            <section class="card">
                <h2>📊 Gantt Chart — Priority Scheduling</h2>
                <div id="gantt-priority" class="gantt-container"></div>
            </section>

            <section class="card">
                <h2>📊 Gantt Chart — SRTF</h2>
                <div id="gantt-srtf" class="gantt-container"></div>
            </section>


            <section class="card">
                <h2>📋 Results — Priority Scheduling</h2>
                <div id="table-priority"></div>
            </section>

            <section class="card">
                <h2>📋 Results — SRTF</h2>
                <div id="table-srtf"></div>
            </section>


            <section class="card">
                <h2>⚖️ Comparison Summary</h2>
                <div id="comparison"></div>
            </section>


            <section class="card">
                <h2>📝 Final Conclusion</h2>
                <div id="conclusion"></div>
            </section>

        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
